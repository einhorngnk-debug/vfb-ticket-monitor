name: VfB Ticket Monitor ohne Login

on:
  schedule:
    - cron: "7,32,57 * * * *"
  workflow_dispatch:
  
permissions:
  contents: write

concurrency:
  group: vfb-ticket-monitor-ohne-login
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Chromium installieren
        run: npx playwright install --with-deps chromium

      - name: Direkte Ticketseite prüfen
        run: npm run monitor
        env:
          EMAIL_ENDPOINT: ${{ secrets.EMAIL_ENDPOINT }}
          EMAIL_SECRET: ${{ secrets.EMAIL_SECRET }}

      - name: Fehlerdateien hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vfb-monitor-fehler
          path: |
            failure.png
            failure.html
          if-no-files-found: ignore
          retention-days: 3

      - name: Status speichern
        if: success()
        run: |
          if git diff --quiet -- state.json; then
            echo "Keine Änderungen zu speichern."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Ticketstatus aktualisieren"
          git push
